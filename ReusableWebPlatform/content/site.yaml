# --- Brand Identity ---
brand:
  name: "Wanderlust Travels"
  tagline: "Explore the World with Us"
  description: "Premium travel experiences curated for the modern explorer. Discover breathtaking destinations, handcrafted itineraries, and unforgettable adventures."
  foundedYear: 2018
  logo: "/assets/logo.svg"
  favicon: "/favicon.svg"

# --- Theme / Colors ---
theme:
  colors:
    primary: "#0F766E"
    secondary: "#134E4A"
    accent: "#F59E0B"
    neutral: "#1F2937"
    background: "#FFFFFF"
    surface: "#F0FDFA"
  fonts:
    heading: "Inter"
    body: "Inter"
  borderRadius: "0.75rem"

# --- Navigation ---
navigation:
