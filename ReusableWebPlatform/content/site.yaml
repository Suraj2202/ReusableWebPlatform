  stats:
    - value: "500+"
      label: "Happy Travelers"
    - value: "50+"
      label: "Destinations"
    - value: "6+"
      label: "Years Experience"
    - value: "4.9"
      label: "Average Rating"

# --- Services / Tours ---
services:
  title: "Our Tours"
  subtitle: "Choose your perfect adventure"
  items:
    - title: "Beach Getaways"
      icon: "sun"
      description: "Pristine beaches, crystal waters, and golden sunsets. Relax and unwind at the world's most beautiful coastal destinations."
      image: "/assets/services/beach.jpg"
      href: "/tours#beach"
    - title: "Mountain Expeditions"
      icon: "mountain"
      description: "Conquer majestic peaks and trek through breathtaking trails. From the Himalayas to the Andes, adventure awaits."
      image: "/assets/services/mountain.jpg"
      href: "/tours#mountain"
    - title: "Cultural Journeys"
      icon: "landmark"
      description: "Immerse yourself in rich traditions, ancient history, and vibrant local cultures across continents."
      image: "/assets/services/culture.jpg"
      href: "/tours#culture"
    - title: "Wildlife Safaris"
      icon: "binoculars"
      description: "Get up close with nature's magnificent creatures in their natural habitats. Unforgettable wildlife encounters."
      image: "/assets/services/safari.jpg"
      href: "/tours#safari"
    - title: "City Escapes"
      icon: "building"
      description: "Explore iconic cities, hidden gems, world-class cuisine, and vibrant nightlife around the globe."
      image: "/assets/services/city.jpg"
      href: "/tours#city"
    - title: "Cruise Adventures"
      icon: "ship"
      description: "Set sail on luxury cruises with stunning ocean views, gourmet dining, and exotic port stops."
      image: "/assets/services/cruise.jpg"
      href: "/tours#cruise"

