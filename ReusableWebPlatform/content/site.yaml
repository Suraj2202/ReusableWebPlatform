# --- FAQ ---
faq:
  title: "Frequently Asked Questions"
  subtitle: "Everything you need to know"
  items:
    - question: "How do I book a tour package?"
      answer: "Browse our tours, select your preferred package, and click 'Book Now'. Our team will contact you within 24 hours to finalize the details."
    - question: "Can I customize my itinerary?"
      answer: "Absolutely! We specialize in personalized travel experiences. Share your preferences and we'll craft a custom itinerary just for you."
    - question: "What's included in the tour packages?"
      answer: "Our packages typically include accommodation, guided tours, transfers, and select meals. Specific inclusions vary by package — check individual tour details."
    - question: "What is your cancellation policy?"
      answer: "Free cancellation up to 30 days before departure. Between 15-30 days, a 50% fee applies. Less than 15 days is non-refundable."
    - question: "Do you offer travel insurance?"
      answer: "Yes, we partner with leading insurance providers to offer comprehensive travel insurance. We strongly recommend it for all trips."
    - question: "How far in advance should I book?"
      answer: "We recommend booking at least 2-3 months in advance for popular destinations. Last-minute bookings are possible but subject to availability."

# --- Contact Information ---
