# Hidden Naqsha — central site config (SINGLE SOURCE OF TRUTH)
# Edit brand, contact, social handles, and theme tokens here.
# Components and tailwind.config.mjs read from this file. Change once → whole site updates.

site:
  name: Hidden Naqsha
  tagline: Crafting journeys through hidden landscapes
  description: Trips, treks, and bespoke journeys across the Himalayas and beyond.
  url: https://hidden-naqsha.pages.dev
  locale: en
  currency: '₹'

contact:
  # PLACEHOLDER number — replace with the real WhatsApp business number (digits only, country code, no +).
  whatsapp: '910000000000'
  email: hello@hiddennaqsha.example

social:
  instagram: 'hiddennaqsha'
  # Review/follower snapshots are generated into content/data/social.json by the sync script (see docs/rules/04-social-sync.md).

# Home "Company Overview" section (step 1.2). Single source of truth for who-we-are copy.
overview:
  eyebrow: Who we are
  heading: Journeys mapped by people who live the mountains
  body:
    - >-
      Hidden Naqsha is a small team of mountain-born guides and obsessive
      planners. We design trips, treks, and bespoke escapes across the Himalayas
      and beyond — the routes guidebooks miss and locals keep to themselves.
    - >-
      From first-time trekkers to seasoned riders, we handle the details —
      permits, stays, acclimatisation, safety — so you can simply travel. No
      crowds, no cookie-cutter packages, just thoughtfully crafted journeys.
  stats:
    - value: '60+'
      label: Curated journeys
    - value: '4.9★'
      label: Traveller rating
    - value: '8'
      label: Years in the mountains

theme:
  colors:
    primary: '#0F4C45' # deep pine / teal — headers, primary buttons, key accents
    secondary: '#0A3A34' # darker pine — hovers, depth
    accent: '#C9A24B' # warm gold — CTAs, highlights, stars
    neutral: '#1F2A28' # charcoal — body text
    surface: '#F7F4EF' # warm off-white — section backgrounds
  fonts:
    heading: Fraunces # elegant modern serif
    body: Inter # clean, legible sans
  borderRadius: '0.75rem'

# Programs — /family, /school, /corporate page content (data-driven, single source of truth)
programs:
  family:
    title: Family Trips
    tagline: Relaxed, safe itineraries paced for kids and grandparents alike.
    image: /assets/categories/family.jpg
    narrative:
      - >-
        We understand that family travel isn't just about the destination — it's about shared
        moments. Our family journeys are designed with generous rest days, child-friendly stays,
        and activities that engage every age group without exhausting anyone.
      - >-
        From lakeside picnics in Kashmir to gentle nature walks in Meghalaya, every day is
        crafted so the youngest and the eldest can participate equally. Safety, comfort, and
        wonder — in that order.
    highlights:
      - icon: shield
        title: Safety First
        text: Vetted stays, experienced guides, and medical backup on every trip.
      - icon: clock
        title: Relaxed Pacing
        text: No 4 AM starts. Generous rest days built in for kids and elders.
      - icon: map
        title: Curated Experiences
        text: Activities designed for all ages — from toddlers to grandparents.
      - icon: heart
        title: Memories Over Miles
        text: We prioritise meaningful moments over ticking off tourist spots.
  school:
    title: School Trips
    tagline: Educational tours with supervision, safety, and learning built in.
    image: /assets/categories/school.jpg
    narrative:
      - >-
        Our school programmes blend experiential learning with adventure. Students don't just
        visit places — they interact with local communities, learn geography first-hand, and
        build confidence through age-appropriate challenges.
      - >-
        Every itinerary is co-designed with educators. We handle permissions, transport,
        accommodation, meals, and safety protocols — so teachers can focus on teaching and
        students can focus on discovery.
    highlights:
      - icon: book
        title: Learning by Doing
        text: Curriculum-aligned activities — ecology, history, geography come alive.
      - icon: shield
        title: Supervised & Safe
        text: 1:10 guide-to-student ratio, 24/7 on-call support, parent updates.
      - icon: users
        title: Team Building
        text: Collaborative challenges that build leadership and social skills.
      - icon: award
        title: Certified Programmes
        text: Post-trip certificates and teacher feedback reports included.
  corporate:
    title: Corporate Retreats
    tagline: Offsites and team retreats — logistics handled end to end.
    image: /assets/categories/corporate.jpg
    narrative:
      - >-
        Break the conference-room monotony. Our corporate retreats are designed to recharge
        teams, spark creativity, and strengthen bonds — all while we handle every logistical
        detail from airport transfers to team dinner arrangements.
      - >-
        Whether it's a leadership offsite in Ladakh or a creative workshop beside Dal Lake,
        we tailor each programme to your team size, objectives, and comfort preferences.
        No generic packages — only bespoke experiences.
    highlights:
      - icon: briefcase
        title: End-to-End Logistics
        text: Transport, stays, meals, venues, AV — we manage it all.
      - icon: target
        title: Goal-Oriented Design
        text: Tell us your objectives and we'll design activities around them.
      - icon: users
        title: Scales Easily
        text: From 8-person leadership teams to 200-person company offsites.
      - icon: zap
        title: Zero Downtime
        text: Dedicated coordinator ensures everything runs on schedule.

# About Us page (/about)
about:
  title: About Us
  tagline: The story behind the trails we trace.
  image: /assets/misc/about-hero.jpg
  story:
    - >-
      Hidden Naqsha was born from a simple frustration — every travel company offered the same
      routes, the same buses, the same checklist tourism. We wanted to share the Kashmir we grew
      up in: the meadows locals picnic at, the passes only shepherds know, the village homes
      where chai tastes different.
    - >-
      What started as friends guiding friends in 2018 has grown into a team of mountain-born
      planners, certified trek leaders, and logistics nerds. We still plan every trip as if a
      friend is coming — because that's exactly who you are to us.
    - >-
      Today, Hidden Naqsha operates 60+ curated journeys across the Himalayas and beyond.
      From beginner-friendly getaways to expedition-grade adventures, every route is scouted
      on foot, every stay is personally vetted, and every itinerary is designed to leave you
      with stories — not just photos.
  values:
    - icon: map
      title: Local Knowledge
      text: Born and raised in the mountains — we know trails that don't appear on maps.
    - icon: shield
      title: Safety Always
      text: Certified leaders, medical kits, satellite comms, and real-time weather checks.
    - icon: heart
      title: Small Groups
      text: Capped group sizes so every traveller gets attention, not just a seat.
    - icon: award
      title: No Compromises
      text: We vet every stay, every vehicle, every meal — nothing is left to chance.

# Contact page (/contact)
contactPage:
  title: Get In Touch
  tagline: Let's plan your next journey together.
  image: /assets/misc/contact-hero.jpg
  location: Kashmir, India
