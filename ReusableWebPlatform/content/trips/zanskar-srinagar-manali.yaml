overview: >-
  One of the great Himalayan road journeys — from the houseboats of Srinagar
  across the remote Zanskar range to the orchards of Manali. Nine days of high
  passes, river gorges, and villages that time forgot.
highlights:
  - Crossing Penzi La into Zanskar
  - Drang-Drung glacier viewpoint
  - Remote Phugtal-region landscapes
  - Finish over Rohtang into Manali
