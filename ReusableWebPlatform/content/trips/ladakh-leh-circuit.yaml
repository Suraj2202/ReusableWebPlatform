slug: ladakh-leh-circuit
title: Ladakh Leh Circuit
category: group-trip
durationNights: 6
durationDays: 7
pickup: Leh
drop: Leh
priceFrom: 24999
cover: trips/ladakh-leh-circuit/cover.jpg
gallery:
  - trips/ladakh-leh-circuit/gallery-01.jpg
  - trips/ladakh-leh-circuit/gallery-02.jpg
