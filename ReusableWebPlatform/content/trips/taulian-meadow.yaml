overview: >-
  A short, scenic climb above Pahalgam to the open meadow of Taulian, with
  grandstand views of Kolahoi glacier and the surrounding peaks. The perfect
  weekend trek — easy enough for beginners, beautiful enough for everyone.
highlights:
  - Kolahoi glacier views
  - Baisaran and Taulian meadows
  - Pine forest trails
  - Beginner-friendly gradient
itinerary:
  - day: 1
    title: Pahalgam to Baisaran
    points:
      - Climb to the meadow base camp
  - day: 2
    title: Baisaran to Taulian and back
    points:
      - Ascend to Taulian meadow
      - Glacier viewpoints
  - day: 3
    title: Descent and departure
    points:
      - Return to Pahalgam
