overview: >-
  A quiet walk through the Hirpora Wildlife Sanctuary along the old Mughal Road,
  home to the rare markhor. Forested ridges, shepherd trails, and sweeping views
  toward the Pir Panjal — a gentle weekend in the wild.
highlights:
  - Hirpora Wildlife Sanctuary
  - Historic Mughal Road
  - Pir Panjal range views
  - Chance sightings of markhor
