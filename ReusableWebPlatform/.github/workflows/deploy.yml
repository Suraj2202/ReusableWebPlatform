# =============================================================
# Deploy Pipeline — Deploys to Cloudflare Pages on main push
# Only runs after CI passes
# =============================================================

name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  deployments: write

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: []

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=${{ vars.CLOUDFLARE_PROJECT_NAME || 'reusable-web-platform' }}

      # To enable this workflow:
      # 1. Create Cloudflare Pages project
      # 2. Add these GitHub secrets:
      #    - CLOUDFLARE_API_TOKEN  (from Cloudflare dashboard → API Tokens)
      #    - CLOUDFLARE_ACCOUNT_ID (from Cloudflare dashboard → Overview)
      # 3. Optionally set CLOUDFLARE_PROJECT_NAME as a GitHub variable
